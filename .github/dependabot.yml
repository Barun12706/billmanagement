version: 2
updates:
  # Enable npm dependency updates
  - package-ecosystem: "npm"
    # Look for package.json in the root directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
    # Assign PRs to a specific user (optional, can be modified)
    # reviewers:
    #   - "your-github-username"
